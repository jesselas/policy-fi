<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5f5f2"/>
      <stop offset="100%" stop-color="#e8e8e4"/>
    </radialGradient>
  </defs>

  <!-- Background - light -->
  <circle cx="32" cy="32" r="32" fill="url(#bg-grad)"/>

  <g clip-path="url(#circle-clip)">
    <!-- Outer globe ring -->
    <circle cx="32" cy="32" r="31" fill="none" stroke="#2a4a54" stroke-width="2.5" opacity="0.45"/>

    <!-- Globe arcs -->
    <ellipse cx="32" cy="32" rx="31" ry="15" fill="none" stroke="#2a4a54" stroke-width="1.1" opacity="0.3" transform="rotate(-20 32 32)"/>
    <ellipse cx="32" cy="32" rx="31" ry="15" fill="none" stroke="#2a4a54" stroke-width="0.8" opacity="0.18" transform="rotate(25 32 32)"/>
    <ellipse cx="32" cy="32" rx="12" ry="31" fill="none" stroke="#2a4a54" stroke-width="1.1" opacity="0.3"/>
    <ellipse cx="32" cy="32" rx="22" ry="31" fill="none" stroke="#2a4a54" stroke-width="0.7" opacity="0.15"/>

    <!-- Connection lines -->
    <line x1="12" y1="16" x2="28" y2="26" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="28" y1="26" x2="50" y2="18" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="28" y1="26" x2="40" y2="44" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="40" y1="44" x2="54" y2="38" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="12" y1="16" x2="18" y2="42" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="18" y1="42" x2="40" y2="44" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="50" y1="18" x2="54" y2="38" stroke="#1a3a44" stroke-width="0.9" opacity="0.4"/>
    <line x1="28" y1="26" x2="18" y2="42" stroke="#1a3a44" stroke-width="0.7" opacity="0.25"/>
    <line x1="12" y1="16" x2="50" y2="18" stroke="#1a3a44" stroke-width="0.6" opacity="0.15"/>

    <!-- Data nodes - deep teal -->
    <circle cx="12" cy="16" r="3" fill="#0b525b"/>
    <circle cx="28" cy="26" r="3.5" fill="#0d5e68"/>
    <circle cx="50" cy="18" r="2.4" fill="#0b525b"/>
    <circle cx="40" cy="44" r="3" fill="#0b525b"/>
    <circle cx="54" cy="38" r="2.2" fill="#0d5e68"/>
    <circle cx="18" cy="42" r="2.4" fill="#0d5e68"/>

    <!-- Secondary nodes -->
    <circle cx="6" cy="32" r="1.5" fill="#0b525b" opacity="0.3"/>
    <circle cx="58" cy="28" r="1.5" fill="#0b525b" opacity="0.3"/>
    <circle cx="32" cy="5" r="1.5" fill="#0b525b" opacity="0.3"/>
    <circle cx="26" cy="58" r="1.5" fill="#0b525b" opacity="0.3"/>
    <circle cx="48" cy="52" r="1.2" fill="#0b525b" opacity="0.2"/>
    <circle cx="10" cy="50" r="1.2" fill="#0b525b" opacity="0.2"/>
  </g>
</svg>
